name: Publish to NPM

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x — required for OIDC trusted publishing + provenance
          # (npm 10 from older Node lines can yield misleading E404 on publish; see npm/cli#9088).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build package
        run: npm run build
      
      - name: Publish to NPM (OIDC)
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true


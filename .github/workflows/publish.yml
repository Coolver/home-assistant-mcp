name: Publish to NPM

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      # Do not run `npm install -g npm@latest` here: it can leave npm in a broken
      # state on ubuntu-latest (e.g. MODULE_NOT_FOUND: promise-retry). The npm
      # bundled with Node 22 is sufficient for `npm publish` with provenance/OIDC.
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build package
        run: npm run build
      
      - name: Publish to NPM (OIDC)
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true

